<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quickly | Smart NFC Digital Business Cards</title>

    <meta name="description" content="Quickly lets you create and share your smart digital business card instantly via NFC. No app needed." />

    <!-- FIX: Use env var for og:url so it reflects the real domain at build time.
         Set REACT_APP_SITE_URL in your .env.production -->
    <meta property="og:title"       content="Quickly | Smart NFC Digital Business Cards" />
    <meta property="og:description" content="Tap to connect. Share your digital profile instantly — no app needed." />
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="%REACT_APP_SITE_URL%" />
    <!-- FIX: Use an image that actually exists in /public -->
    <meta property="og:image"       content="%REACT_APP_SITE_URL%/quickly-manifest-512x512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Quickly | Smart NFC Digital Business Cards" />
    <meta name="twitter:description" content="Tap to connect. Share your digital profile instantly — no app needed." />
    <meta name="twitter:image"       content="%REACT_APP_SITE_URL%/quickly-manifest-512x512.png" />

    <!-- FIX: reference icons that actually exist in /public -->
    <link rel="icon"             href="/favicon.ico" />
    <link rel="icon"             href="/favicon.svg"       type="image/svg+xml" />
    <link rel="icon"             href="/favicon-96x96.png" sizes="96x96" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run the Quickly App.</noscript>
    <div id="root"></div>
  </body>
</html>
